apiVersion: apps/v1
kind: Deployment
metadata:
  name: freeipa-server
  namespace: freeipa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: freeipa-server
  template:
    metadata:
      labels:
        app: freeipa-server
    spec:
      # https://github.com/freeipa/freeipa-container?tab=readme-ov-file#running-in-kubernetes
      hostUsers: false
      restartPolicy: Always
      containers:
      - name: freeipa-server
        image: freeipa/freeipa-server:fedora-rawhide-4.13.1
        imagePullPolicy: IfNotPresent
        # command: [ "tail", "-f", "/dev/null" ]
        args:
          - --hostname=freeipa-server.d.freeipa.svc.cluster.local
        tty: true
        securityContext:
          readOnlyRootFilesystem: false
        volumeMounts:
        - name: freeipa-server-data
          mountPath: /data
        ports:
        - containerPort: 80
          protocol: TCP
        - containerPort: 443
          protocol: TCP
        - containerPort: 53
          protocol: UDP
        - containerPort: 88
          protocol: TCP
        - containerPort: 88
          protocol: UDP
        env:
        - name: DEBUG_TRACE
          value: "true"
        - name: PASSWORD
          valueFrom:
            secretKeyRef:
              name: freeipa-server-password
              key: admin.password
        - name: IPA_SERVER_INSTALL_OPTS
          value: "--debug --unattended --realm me-yoda --no-forwarders --no-ntp"
          # 
    # --debug
    # --unattended
    # --realm=me-yoda
    # --hostname=freeipa-server.d.freeipa.svc.cluster.local
    # --realm=example.org
    # --ds-password=admin
    # --setup-dns 
    # --no-forwarders 
    # --no-ntp          
          # --ip-address=10.96.128.128
        - name: IPA_SERVER_IP
          value: no-update
        readinessProbe:
          exec:
            command: [ "/usr/bin/systemctl", "status", "ipa" ]
          initialDelaySeconds: 60
          timeoutSeconds: 10
          periodSeconds: 10
          successThreshold: 1
          failureThreshold: 3
      # dnsPolicy: "None"
      # dnsConfig:
      #   nameservers:
      #     - 127.0.0.1
      # hostAliases:
      # - ip: "10.96.128.128"
      #   hostnames:
      #   - "freeipa-server.d.freeipa.svc.cluster.local"
        # volumeMounts:
        #   - name: options
        #     mountPath: /var/lib/ipa-data/ipa-server-install-options
        #     readOnly: true
      subdomain: d
      setHostnameAsFQDN: true
      volumes:
      - name: freeipa-server-data
        persistentVolumeClaim:
          claimName: freeipa-data-pvc
      # - name: options
      #   configMap:
      #     name: freeipa-options
