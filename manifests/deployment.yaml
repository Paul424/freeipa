---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: freeipa-server
  namespace: freeipa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: freeipa-server
  template:
    metadata:
      labels:
        app: freeipa-server
    spec:
      restartPolicy: Always
      hostUsers: false
      containers:
      - name: freeipa-server
        image: freeipa/freeipa-server:fedora-rawhide-4.13.1
        imagePullPolicy: IfNotPresent
        securityContext:
          readOnlyRootFilesystem: true
        volumeMounts:
        - name: freeipa-server-data
          mountPath: /data
        ports:
        - containerPort: 80
          protocol: TCP
        - containerPort: 443
          protocol: TCP
        - containerPort: 53
          protocol: UDP
        - containerPort: 88
          protocol: TCP
        - containerPort: 88
          protocol: UDP
        env:
        - name: PASSWORD
          valueFrom:
            secretKeyRef:
              name: freeipa-server-password
              key: admin.password
        - name: IPA_SERVER_INSTALL_OPTS
          value: "-U -r CLUSTER.LOCAL --setup-dns --no-forwarders --no-ntp --ip-address=10.43.201.201"
        - name: IPA_SERVER_IP
          value: no-update
        readinessProbe:
          exec:
            command: [ "/usr/bin/systemctl", "status", "ipa" ]
          initialDelaySeconds: 60
          timeoutSeconds: 10
          periodSeconds: 10
          successThreshold: 1
          failureThreshold: 3
      dnsPolicy: "None"
      dnsConfig:
        nameservers:
          - 127.0.0.1
      hostAliases:
      - ip: "10.43.201.201"
        hostnames:
        - "freeipa-server.dom1.default.svc.cluster.local"
      subdomain: dom1
      setHostnameAsFQDN: true
      volumes:
      - name: freeipa-server-data
        persistentVolumeClaim:
          claimName: freeipa-data-pvc
